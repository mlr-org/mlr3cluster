url: https://mlr3cluster.mlr-org.com

template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax
  package: mlr3pkgdowntemplate

development:
  mode: auto
  version_label: default
  version_tooltip: "Version"

toc:
  depth: 3

navbar:
  structure:
    left:  [reference, news, book]
    right: [search, github, mattermost, stackoverflow, rss, lightswitch]
  components:
    home: ~
    reference:
      icon: fa fa-file-alt
      text: Reference
      href: reference/index.html
    mattermost:
      icon: fa fa-comments
      href: https://lmmisld-lmu-stats-slds.srv.mwn.de/mlr_invite/
    book:
      text: mlr3book
      icon: fa fa-link
      href: https://mlr3book.mlr-org.com
    stackoverflow:
      icon: fab fa-stack-overflow
      href: https://stackoverflow.com/questions/tagged/mlr3
    rss:
      icon: fa-rss
      href: https://mlr-org.com/

reference:
  - title: Learners
    contents:
      - starts_with("mlr_learners_clust")
  - title: Measures
    contents:
      - starts_with("mlr_measures_clust")
  - title: Tasks
    contents:
      - starts_with("mlr_task")
  - title: General
    contents:
      - MeasureClust
      - PredictionClust
      - TaskClust
      - LearnerClust
      - as_prediction_clust
      - as_task_clust
      - mlr3cluster-package
